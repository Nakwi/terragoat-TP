name: IaC Security Scan - Azure

# Déclenchement : à chaque push ou PR sur master qui touche le périmètre Azure
on:
  push:
    branches:
      - master
    paths:
      - "terraform/azure/**"
      - ".github/workflows/iac-security.yml"
  pull_request:
    branches:
      - master
    paths:
      - "terraform/azure/**"
  workflow_dispatch:   # lancement manuel possible

permissions:
  contents: read
  security-events: write   # permet d'uploader le SARIF dans l'onglet Security

jobs:
  security-scan:
    name: Validate + Checkov (blocage sur critiques)
    runs-on: ubuntu-latest

    steps:
      # 1. Récupère le code
      - name: Checkout du code
        uses: actions/checkout@v4

      # 2. Installe Terraform (version alignée sur le required_version du projet)
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.7"

      # 3. Vérifie que le code Terraform est syntaxiquement valide
      - name: Terraform Init & Validate
        working-directory: terraform/azure
        run: |
          terraform init -backend=false
          terraform validate

      # 4. Scan de sécurité Checkov
      #    - soft_fail global : les findings mineurs / risques acceptés ne bloquent pas
      #    - hard_fail_on : la liste des checks CRITIQUES qui, eux, BLOQUENT le pipeline
      - name: Checkov - scan de securite IaC
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/azure
          framework: terraform
          output_format: cli,json,sarif
          output_file_path: reports/checkov
          soft_fail: true
          hard_fail_on: >-
            CKV_AZURE_9,CKV_AZURE_10,
            CKV_AZURE_53,CKV_AZURE_68,CKV_AZURE_113,
            CKV_AZURE_28,CKV_AZURE_29,
            CKV_AZURE_39,
            CKV_AZURE_1,CKV_AZURE_149,CKV_AZURE_178,
            CKV_AZURE_5

      # 5. Conserve les rapports (meme si le scan a bloque, grace a always())
      - name: Upload des rapports Checkov
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rapports-checkov
          path: reports/
          retention-days: 90
