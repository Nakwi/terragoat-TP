name: IaC Security Scan - Azure

# Déclenchement : à chaque push ou PR sur master qui touche le périmètre Azure
on:
  push:
    branches:
      - master
    paths:
      - "terraform/azure/**"
      - ".github/workflows/**"
  pull_request:
    branches:
      - master
    paths:
      - "terraform/azure/**"
  workflow_dispatch:   # lancement manuel possible

permissions:
  contents: read
  security-events: write   # nécessaire pour publier le SARIF dans l'onglet Security

jobs:
  security-scan:
    name: Validate + Checkov (blocage sur critiques)
    runs-on: ubuntu-latest

    steps:
      # 1. Récupère le code
      - name: Checkout du code
        uses: actions/checkout@v4

      # 2. Installe Terraform (version alignée sur le required_version du projet)
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.7"

      # 3. Vérifie que le code Terraform est syntaxiquement valide
      - name: Terraform Init & Validate
        working-directory: terraform/azure
        run: |
          terraform init -backend=false
          terraform validate

      # 4. Scan de sécurité Checkov
      #    - soft_fail : les findings mineurs / risques acceptés ne bloquent pas
      #    - hard_fail_on : les checks CRITIQUES qui BLOQUENT le pipeline
      - name: Checkov - scan de securite IaC
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        continue-on-error: true   # on gère le blocage nous-mêmes plus bas, pour pouvoir publier le SARIF d'abord
        with:
          directory: terraform/azure
          framework: terraform
          output_format: cli,json,sarif
          output_file_path: reports/checkov
          soft_fail: true
          hard_fail_on: >-
            CKV_AZURE_9,CKV_AZURE_10,
            CKV_AZURE_53,CKV_AZURE_68,CKV_AZURE_113,
            CKV_AZURE_28,CKV_AZURE_29,
            CKV_AZURE_39,
            CKV_AZURE_1,CKV_AZURE_149,CKV_AZURE_178,
            CKV_AZURE_5

      # 5. Publie les résultats dans l'onglet Security de GitHub (affichage natif)
      - name: Upload SARIF vers GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: reports/checkov/results_sarif.sarif
          category: checkov

      # 6. Conserve les rapports en artifact téléchargeable
      - name: Upload des rapports Checkov
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rapports-checkov
          path: reports/
          retention-days: 90

      # 7. Écrit un résumé lisible dans le récap du run (onglet Summary)
      - name: Resume du scan dans le Summary
        if: always()
        run: |
          echo "## Resultat du scan de securite Checkov" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/checkov/results_json.json ]; then
            PASSED=$(grep -o '"passed":[0-9]*' reports/checkov/results_json.json | head -1 | grep -o '[0-9]*')
            FAILED=$(grep -o '"failed":[0-9]*' reports/checkov/results_json.json | head -1 | grep -o '[0-9]*')
            echo "| Statut | Nombre |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ Passed | ${PASSED:-N/A} |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ Failed | ${FAILED:-N/A} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "Rapport JSON introuvable." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Vulnerabilites critiques surveillees (blocage si echec) :** SSH/RDP, BDD publiques, SSL, role owner, VM SSH, AKS RBAC" >> $GITHUB_STEP_SUMMARY

      # 8. Fait échouer le job si Checkov a détecté une vulnérabilité critique (hard_fail)
      - name: Verification du blocage critique
        if: steps.checkov.outcome == 'failure'
        run: |
          echo "::error::Une ou plusieurs vulnerabilites CRITIQUES ont ete detectees. Pipeline bloque."
          exit 1
